<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="26" fill="none" stroke="#7AB8FF" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="24;28;24" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#CCE4FF" stroke-width="1.5" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
